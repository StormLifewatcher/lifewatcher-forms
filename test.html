<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeWatcher Support</title>
</head>
<body>

<script>
  // ── Stap 1: laad de Voiceflow bundle ──────────────────────
  // We gebruiken een gewone script tag (GEEN type="module")
  // zodat de widget NIET automatisch opstart.
  // Pas daarna roepen wij chat.load() aan met onze extensie erin.
  var script = document.createElement('script');
  script.src  = 'https://cdn.voiceflow.com/widget-next/bundle.mjs';
  script.type = 'text/javascript';

  script.onload = function() {
    console.log('Bundle geladen. voiceflow.chat keys:', Object.keys(window.voiceflow.chat));

    // ── Stap 2: definieer de extensie ──────────────────────
    var LifeWatcherTicketExtension = {
      name: 'LifeWatcherTicket',
      type: 'response',

      match: function(args) {
        var trace = args.trace;
        console.log('🔍 TRACE binnengekomen:', trace.type, JSON.stringify(trace.payload));

        return (
          trace.type === 'lw_ticket_form' ||
          (trace.payload && trace.payload.name === 'lw_ticket_form') ||
          (trace.payload && trace.payload.type === 'lw_ticket_form')
        );
      },

      render: function(args) {
        var trace   = args.trace;
        var element = args.element;
        console.log('✅ RENDER - formulier wordt geladen');

        var transcript = (trace.payload && trace.payload.transcript) || '';

        var iframe = document.createElement('iframe');
        iframe.src = 'https://stormlifewatcher.github.io/lifewatcher-forms/lifewatcher-ticket-form.html';
        iframe.style.cssText = 'width:100%;height:620px;border:none;border-radius:12px;margin-top:8px;display:block';

        iframe.addEventListener('load', function() {
          iframe.contentWindow.postMessage(
            { type: 'lw_set_transcript', transcript: transcript },
            '*'
          );
        });

        element.appendChild(iframe);

        function onMessage(event) {
          if (!event.data || event.data.type !== 'lw_ticket_submitted') return;
          console.log('✅ Formulier verzonden:', event.data.payload);

          var p = event.data.payload || {};
          window.voiceflow.chat.interact({
            type: 'complete',
            payload: {
              ticket_id:   p.ticket_id   || '',
              email:       p.email       || '',
              name:        p.name        || '',
              serial:      p.serial      || '',
              category:    p.category    || '',
              description: p.description || '',
            }
          });

          window.removeEventListener('message', onMessage);
        }

        window.addEventListener('message', onMessage);
      }
    };

    // ── Stap 3: start de chat ───────────────────────────────
    // Extensions zitten onder assistant: {} — dit is de correcte
    // plek voor widget-next versie 2.x
    window.voiceflow.chat.load({
      verify:    { projectID: '69a94a1102cd5f2a8ac1d0c2' },
      url:       'https://general-runtime.voiceflow.com',
      versionID: 'development',
      render: {
        mode: 'bubble',  // zorgt voor de floating knop rechtsonder
      },
      assistant: {
        extensions: [LifeWatcherTicketExtension]
      }
    });

    console.log('✅ chat.load() aangeroepen');
  };

  document.head.appendChild(script);
</script>

</body>
</html>
