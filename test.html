<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeWatcher – Diagnose</title>
</head>
<body>

<!-- Stap 1: laad de bundle als module via een script tag (niet inline import) -->
<!-- Dit geeft de floating bubble ipv inline rendering -->
<script type="module" src="https://cdn.voiceflow.com/widget-next/bundle.mjs"></script>

<!-- Stap 2: wacht tot window.voiceflow klaar is, log alles -->
<script>
  function init() {
    if (!window.voiceflow || !window.voiceflow.chat) {
      setTimeout(init, 100);
      return;
    }

    console.log('=== VOICEFLOW OBJECT ===');
    console.log('window.voiceflow keys:', Object.keys(window.voiceflow));
    console.log('window.voiceflow.chat keys:', Object.keys(window.voiceflow.chat));
    console.log('chat.load type:', typeof window.voiceflow.chat.load);
    console.log('chat.on type:', typeof window.voiceflow.chat.on);
    console.log('chat.interact type:', typeof window.voiceflow.chat.interact);

    // Probeer de extensie te registreren via chat.load()
    var LifeWatcherTicketExtension = {
      name: 'LifeWatcherTicket',
      type: 'response',
      match: function(args) {
        var trace = args.trace || args;
        console.log('🔍 MATCH AANGEROEPEN met trace.type:', trace.type, 'payload:', JSON.stringify(trace.payload));
        return (
          trace.type === 'lw_ticket_form' ||
          (trace.payload && trace.payload.name === 'lw_ticket_form') ||
          (trace.payload && trace.payload.type === 'lw_ticket_form')
        );
      },
      render: function(args) {
        var element = args.element || args;
        console.log('✅ RENDER AANGEROEPEN');
        var div = document.createElement('div');
        div.style.cssText = 'padding:16px;background:#e8f4fd;border-radius:8px;font-family:sans-serif';
        div.textContent = '✅ Extensie werkt! Formulier wordt geladen...';
        element.appendChild(div);
      }
    };

    // Probeer BEIDE manieren van extensions doorgeven
    window.voiceflow.chat.load({
      verify:    { projectID: '69a94a1102cd5f2a8ac1d0c2' },
      url:       'https://general-runtime.voiceflow.com',
      versionID: 'development',
      // Manier 1: top-level
      extensions: [LifeWatcherTicketExtension],
      // Manier 2: onder assistant (tegelijk proberen)
      assistant: {
        extensions: [LifeWatcherTicketExtension]
      }
    });

    console.log('✅ chat.load() aangeroepen');

    // Probeer ook event listener na load
    setTimeout(function() {
      if (typeof window.voiceflow.chat.on === 'function') {
        window.voiceflow.chat.on('trace', function(trace) {
          console.log('📡 EVENT trace:', trace.type, JSON.stringify(trace.payload));
        });
        console.log('✅ trace event listener geregistreerd');
      } else {
        console.log('❌ chat.on bestaat niet in deze versie');
      }
    }, 1000);
  }

  init();
</script>

</body>
</html>
