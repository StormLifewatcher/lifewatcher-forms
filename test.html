<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeWatcher – Chatbot Test</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    background: #f0f4f8;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 40px;
    max-width: 480px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,.08);
  }
  .logo {
    width: 48px; height: 48px;
    background: #1E6FD9;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
  }
  h1 { font-size: 20px; color: #1A2B45; margin-bottom: 8px; }
  p  { font-size: 14px; color: #6B7B90; line-height: 1.6; }
  .badge {
    display: inline-block;
    background: #EBF3FD;
    color: #154FA6;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    margin-top: 16px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
    </svg>
  </div>
  <h1>LifeWatcher Chatbot Test</h1>
  <p>Dit is een testpagina voor de chatbot integratie.<br>
     Klik op het chatpictogram rechtsonder om te beginnen.</p>
  <div class="badge">🧪 Development versie</div>
</div>

<script type="module">
  import { LifeWatcherTicketExtension }
    from 'https://stormlifewatcher.github.io/lifewatcher-forms/lw-extension.js';

  (function(d, t) {
    var v = d.createElement(t), s = d.getElementsByTagName(t)[0];
    v.onload = function() {
      window.voiceflow.chat.load({
        verify: { projectID: '69a94a1102cd5f2a8ac1d0c2' },
        url: 'https://general-runtime.voiceflow.com',
        versionID: 'development',
        voice: {
          url: "https://runtime-api.voiceflow.com"
        },
        extensions: [LifeWatcherTicketExtension]
      });
    }
    v.src = "https://cdn.voiceflow.com/widget/bundle.mjs";
    v.type = "text/javascript";
    s.parentNode.insertBefore(v, s);
  })(document, 'script');
</script>
</body>
</html>
